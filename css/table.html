<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />


    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Table</title>

    <style>
    
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4; 
        padding: 40px; 
      }

     
      h2 {
        color: #2c3e50;
      }

      
      table {
        width: 400px; 
        border-collapse: collapse;
        

        background: white; 
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        
      }

      
      th {
        background-color: #3498db; 
        color: white; 
        padding: 10px; 
        text-align: left; 
      }

      
      td {
        padding: 10px; 
        border-bottom: 1px solid #ddd; 
      }

     
      tr:hover {
        background-color: #f1f9ff; 
      }
    </style>
  </head>

  <body>
    <h2>HTML Menengah</h2>

    <h3>Tabel</h3>

    <table>
     
      <thead>
        <tr>
          <th>Nama</th>
          <th>Kelas</th>
          <th>Jurusan</th>
        </tr>
      </thead>

     
      <tbody>
        <tr>
          <td>Andi</td>
          <td>XI</td>
          <td>PPLG</td>
        </tr>

        <tr>
          <td>Sinta</td>
          <td>XII</td>
          <td>PPLG</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
